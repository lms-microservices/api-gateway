spring.application.name=api-gateway
server.port=8080

# Eureka client configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# CORS configuration to allow requests from any origin
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOrigins=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedMethods=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allow-credentials=false

# JWT configuration
jwt.secret=${JWT_SECRET:supersecretkey-supersecretkey-2026}
jwt.public-paths=/api/auth/**,/api/payments/webhook

# Routes
# auth-service ? PUBLIC: no JWT filter on /api/auth/** (register, login, refresh)
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://auth-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**

# user-service ? PROTECTED
spring.cloud.gateway.server.webflux.routes[1].id=user-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://user-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/users/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=JwtAuthFilter

# course-service ? MIXED (public browse + protected enroll/create)
# One route handles all; your JwtAuthFilter passes public GETs through.
spring.cloud.gateway.server.webflux.routes[2].id=course-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://course-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/courses/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=JwtAuthFilter

# payment-service ? PROTECTED
spring.cloud.gateway.server.webflux.routes[3].id=payment-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://payment-service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/payments/**
spring.cloud.gateway.server.webflux.routes[3].filters[0]=JwtAuthFilter

# notification-service ? PROTECTED
spring.cloud.gateway.server.webflux.routes[4].id=notification-service
spring.cloud.gateway.server.webflux.routes[4].uri=lb://notification-service
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/notifications/**
spring.cloud.gateway.server.webflux.routes[4].filters[0]=JwtAuthFilter

# review-service ? PROTECTED
spring.cloud.gateway.server.webflux.routes[5].id=review-service
spring.cloud.gateway.server.webflux.routes[5].uri=lb://review-service
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/api/reviews/**
spring.cloud.gateway.server.webflux.routes[5].filters[0]=JwtAuthFilter

# Stripe webhook ? NO JWT (Stripe sends its own signature header)
spring.cloud.gateway.server.webflux.routes[6].id=stripe-webhook
spring.cloud.gateway.server.webflux.routes[6].uri=lb://payment-service
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/api/payments/webhook
spring.cloud.gateway.server.webflux.routes[6].predicates[1]=Method=POST
